name: Refresh OKBK live data

on:
  schedule:
    - cron: '17 * * * *'   # every hour at :17 (off-peak so OpenSky load is light)
  workflow_dispatch:        # manual trigger via GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Fetch live OpenSky snapshot
        run: node scripts/fetch-live.mjs
        env:
          OPENSKY_USER: ${{ secrets.OPENSKY_USER }}
          OPENSKY_PASS: ${{ secrets.OPENSKY_PASS }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet public/data/okbk_live.json; then
            echo "No change."
          else
            git add public/data/okbk_live.json
            git commit -m "auto: refresh okbk_live.json"
            git push
          fi

      - name: Build site
        run: |
          npm ci
          npm run build

      - name: Deploy to gh-pages
        run: |
          npm i -g gh-pages
          GIT_AUTHOR_NAME="github-actions[bot]" \
          GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com" \
          GIT_COMMITTER_NAME="github-actions[bot]" \
          GIT_COMMITTER_EMAIL="41898282+github-actions[bot]@users.noreply.github.com" \
          gh-pages -d dist -u "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
